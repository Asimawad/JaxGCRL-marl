defaults:
  - logger: logger
  - arch: anakin
  - system: icrl/ff_icrl
  - network: icrl
  - env: jaxnav  # [mpe, smax, vector-connector]
  - search_space@hydra.sweeper.params: ff_icrl
  - override hydra/sweeper: optuna
  - override hydra/sweeper/sampler: tpe
  - _self_

logger:
  loggers:
    neptune:
      tag: ["icrl", "jaxnav"]
      group_tag: ["icrl-sweep-04-02-2026"]
      enabled: False

system:
  num_updates: 100
  target_entropy_scale: -0.14
  add_agent_id: False
  gamma: 0.9999
  max_grad_norm: 1
  policy_lr: 7e-6
  q_lr: 2e-4
  alpha_lr: 3e-4
  logsumexp_penalty_coeff: 0.16

arch:
  num_envs: 128
  num_evaluation: 100
  absolute_metric: False

env:
  goal_type: distance
  eval_metric: success

hydra:
  searchpath:
    - file://mava/configs
  mode: MULTIRUN
  sweeper:
    sampler:
      seed: 42
    direction: maximize
    study_name: default-study-name
    storage: null
    n_trials: 100
    n_jobs: 1