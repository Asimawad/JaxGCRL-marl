defaults:
  - logger: logger
  - arch: anakin
  - system: icrl/ppo_crl_continuous
  - network: ppo_crl
  - env: brax_ant
  - _self_

arch:
  num_envs: 256
  num_evaluation: 25
  num_eval_episodes: 512
  absolute_metric: False

system:
  num_updates: 1500
  rollout_length: 128
  use_old_wrapper: false
  add_agent_id: false
  use_achieved_goal: true
  use_gae: false
  reward_advantage_coeff: 0.0
  use_reinforce: false
  energy_fn: dot
  contrastive_loss_fn: fwd_infonce
  gamma: 0.9999
  actor_lr: 1.5e-6
  q_lr: 4e-6
  clip_eps: 0.15
  ent_coef: 0.25
  num_epochs: 8
  batch_size: 256
  num_mc_samples: 32
  contrastive_temperature: 2.5
  logsumexp_penalty_coeff: 0.1
  num_critic_warmup_epochs: 1
  use_adaptive_entropy: false
  target_entropy: 4
  lr_linear_decay: false

env:
  eval_metric: success

hydra:
  searchpath:
    - file://mava/configs
