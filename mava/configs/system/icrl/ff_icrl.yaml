# --- FF-ICRL System Config ---

# Enable ICRL
use_icrl: true

# Seed
total_timesteps: ~ # Set the total environment steps.
num_updates: 1220 # Number of updates
seed: 42
# Training steps
update_batch_size: 1
explore_steps: 1000  
add_agent_id: True
num_eval_envs: 32
render_every_n_evals: 0  # Render episode every N eval iterations (0 to disable)
# Environment steps
rollout_length: 100 # Number of environment steps per vectorised environment.
eval_rollout_length: 128

# Buffer
buffer_size: 1000  # Smaller buffer for smaller problem
batch_size: 256

# Learning rates
policy_lr: 2e-5
q_lr: 2e-5
alpha_lr: 5e-6
max_grad_norm: 0.5

# Algorithm
gamma: 0.99

# Entropy tuning
target_entropy_scale: 3.0
init_alpha: 0.1

# ICRL-specific
logsumexp_penalty_coeff: 0.1

# and overwritten at runtime. They are provided here as documentation only.
icrl:
  learnable_temperature: true

deterministic_resets: false
use_old_wrapper: false