# Jumanji Sokoban CRL Environment Configuration
# Single-agent box-pushing: move all boxes to target squares.
# Goal: mean box position → mean target position.

env_name: JumanjiSokoban
task_name: jumanji_sokoban

scenario:
  name: Sokoban-v0
  task_name: jumanji_sokoban

# Grid dimensions
num_rows: 10
num_cols: 10

# Episode settings
time_limit: 120

# Single-agent environment
num_agents: 1

# Mava boilerplate
eval_metric: win_rate
implicit_agent_id: false
log_win_rate: true

kwargs: {}
