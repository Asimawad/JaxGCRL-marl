# CRL agent hyperparameters (paper baseline).
#
# Mirror the `CRL` dataclass at `mava/jaxgcrl/agents/crl/crl.py` lines 129-163.
# Defaults match the JaxGCRL paper's `scripts/train.sh` (with `bwd_infonce`).

policy_lr: 3e-4
critic_lr: 3e-4
alpha_lr: 3e-4
batch_size: 256

discounting: 0.99
logsumexp_penalty_coeff: 0.1

train_step_multiplier: 1
disable_entropy_actor: false

max_replay_size: 10000
min_replay_size: 1000
unroll_length: 62

# Network
h_dim: 256
n_hidden: 2
skip_connections: 4
use_relu: false
use_ln: false
repr_dim: 64

# Contrastive
contrastive_loss_fn: bwd_infonce
energy_fn: norm
