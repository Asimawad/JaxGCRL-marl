# Top-level config for the mava-hosted JaxGCRL CRL agent (paper baseline).

defaults:
  - logger: logger
  - system: crl
  - env: ant
  - _self_
  # For sweeps, opt in on the CLI:
  #   python -m mava.jaxgcrl.run --config-name=crl -m \
  #       'hydra/sweeper=optuna' \
  #       '+search_space@hydra.sweeper.params=crl' \
  #       hydra.sweeper.n_trials=20

agent: crl

run:
  seed: 0
  total_env_steps: 50_000_000
  num_envs: 512
  num_eval_envs: 512
  episode_length: 1001
  num_evals: 30
  action_repeat: 1
  cuda: true
  max_devices_per_host: 1

  exp_name: crl_${env.env_name}_seed${run.seed}_${now:%Y-%m-%d}
  log_wandb: true
  wandb_project_name: cppo-brax
  wandb_group: crl-${env.env_name}-${now:%Y-%m-%d}
  wandb_mode: online

  visualization_interval: 5
  vis_length: 1000
  checkpoint_logdir: null

# See cppo.yaml for the equivalent sweep CLI example (use `--config-name=crl`).
