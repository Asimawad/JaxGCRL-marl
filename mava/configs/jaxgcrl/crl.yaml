# Top-level config for the mava-hosted JaxGCRL CRL agent (paper baseline).
# Same multirun-by-default convention as cppo.yaml — see that file for details.

defaults:
  - logger: logger
  - system: crl
  - env: ant
  - search_space@hydra.sweeper.params: crl
  - override hydra/sweeper: optuna
  - override hydra/sweeper/sampler: tpe
  - _self_

agent: crl

run:
  seed: 0
  total_env_steps: 50_000_000
  num_envs: 512
  num_eval_envs: 512
  episode_length: 1001
  num_evals: 30
  action_repeat: 1
  cuda: true
  max_devices_per_host: 1

  exp_name: crl_${env.env_name}_seed${run.seed}_${now:%Y-%m-%d}
  log_wandb: true
  wandb_project_name: cppo-brax
  wandb_group: crl-${env.env_name}-${now:%Y-%m-%d}
  wandb_mode: online

  visualization_interval: 5
  vis_length: 1000
  checkpoint_logdir: null

hydra:
  mode: MULTIRUN
  sweeper:
    sampler:
      seed: 42
    direction: maximize
    study_name: crl-${env.env_name}
    storage: null
    n_trials: 20
    n_jobs: 1
