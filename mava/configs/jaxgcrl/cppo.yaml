# Top-level config for the mava-hosted JaxGCRL CPPO agent.
#
# Modes (matches Mava's ff_icrl convention — every run is a multirun, n_trials
# controls how many trials):
#
#   python -m mava.jaxgcrl.run                                # 20-trial optuna sweep on ant
#   python -m mava.jaxgcrl.run env=humanoid                   # 20-trial sweep on humanoid
#   python -m mava.jaxgcrl.run hydra.sweeper.n_trials=1       # single trial (smoke test)
#   python -m mava.jaxgcrl.run hydra.sweeper.n_trials=100     # bigger sweep
#   python -m mava.jaxgcrl.run system.actor_lr=1e-4           # override one knob, sweep the rest
#
# Multi-seed (override seeds explicitly, search-space still active):
#   python -m mava.jaxgcrl.run hydra.sweeper.n_trials=3 run.seed=0,1,2

defaults:
  - logger: logger
  - system: cppo
  - env: ant
  - search_space@hydra.sweeper.params: cppo
  - override hydra/sweeper: optuna
  - override hydra/sweeper/sampler: tpe
  - _self_

# Which agent class `mava/jaxgcrl/run.py` should construct.
agent: cppo

# Run-level args fed to the agent's `train_fn(config: RunConfig, ...)`.
run:
  seed: 0
  total_env_steps: 50_000_000
  num_envs: 512
  num_eval_envs: 512
  episode_length: 1001
  num_evals: 30
  action_repeat: 1
  cuda: true
  max_devices_per_host: 1

  exp_name: cppo_${env.env_name}_seed${run.seed}_${now:%Y-%m-%d}
  log_wandb: true
  wandb_project_name: cppo-brax
  wandb_group: cppo-${env.env_name}-${now:%Y-%m-%d}
  wandb_mode: online

  visualization_interval: 5
  vis_length: 1000
  checkpoint_logdir: null

# Optuna sweep config — active when `python -m mava.jaxgcrl.run` (multirun is
# always on via `mode: MULTIRUN` below). `hydra.sweeper.params` is loaded from
# `search_space/cppo.yaml` via the defaults entry above.
hydra:
  mode: MULTIRUN
  sweeper:
    sampler:
      seed: 42
    direction: maximize
    study_name: cppo-${env.env_name}
    storage: null
    n_trials: 20
    n_jobs: 1
