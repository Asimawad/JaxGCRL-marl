# yaml-language-server: $schema=https://instadeep.aichor.ai/schema/latest/manifest.schema.json

kind: AIchorManifest
apiVersion: 0.2.2

builder:
  image: genrl-mara-autocurricula
  dockerfile: Dockerfile
  context: .

spec:
  operator: jax
  image: genrl-mara-autocurricula
  command: ./run.sh
  debug:
    vscode:
      enabled: true
      path: "/aichor/code"
      provider: "github"
  types:
    worker:
      count: 1
      resources:
        accelerators:
          gpu:
            count: 1
            # Quadro-RTX-4000 | Tesla-V100-SXM3-32GB | NVIDIA-A100-SXM4-40GB | NVIDIA-A100-SXM4-80GB | NVIDIA-H100-80GB-HBM3
            product: NVIDIA-H100-80GB-HBM3
            type: gpu
        cpus: 4
        ramRatio: 20
